<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Democrat Donkey -->
  <circle cx="24" cy="24" r="22" fill="none"/>
  <!-- Body -->
  <ellipse cx="24" cy="28" rx="13" ry="9" fill="#1565C0"/>
  <!-- Head -->
  <ellipse cx="35" cy="18" rx="6" ry="7" fill="#1565C0"/>
  <!-- Ear left -->
  <ellipse cx="31" cy="8" rx="2.5" ry="6" fill="#1976D2" transform="rotate(-15 31 8)"/>
  <!-- Ear right -->
  <ellipse cx="37" cy="8" rx="2.5" ry="6" fill="#1976D2" transform="rotate(15 37 8)"/>
  <!-- Ear inner -->
  <ellipse cx="31" cy="8" rx="1.5" ry="4" fill="#90CAF9" transform="rotate(-15 31 8)"/>
  <ellipse cx="37" cy="8" rx="1.5" ry="4" fill="#90CAF9" transform="rotate(15 37 8)"/>
  <!-- Muzzle -->
  <ellipse cx="38" cy="21" rx="4" ry="3" fill="#1976D2"/>
  <!-- Eye -->
  <circle cx="34" cy="16" r="1.5" fill="white"/>
  <circle cx="34.5" cy="16" r="0.7" fill="#333"/>
  <!-- Nostril -->
  <circle cx="39" cy="20.5" r="0.7" fill="#0D47A1"/>
  <!-- Mouth -->
  <path d="M36,23 Q38,25 40,23" stroke="#0D47A1" stroke-width="0.8" fill="none"/>
  <!-- Legs -->
  <line x1="15" y1="34" x2="13" y2="44" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="21" y1="35" x2="20" y2="44" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="27" y1="35" x2="28" y2="44" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="33" x2="34" y2="44" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M11,26 Q7,22 9,17 Q10,15 8,13" stroke="#1565C0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Stars on body -->
  <text x="19" y="30" font-size="6" fill="white" font-family="sans-serif">&#9733;&#9733;&#9733;</text>
</svg>
